# Models to run.
# Comment out or remove names to disable specific models.
# Valid options: "CART", "KNN", "MLP", "RF", "SGD", "SVM_linear", "SVM_rbf"
# To run ALL models, leave the list empty: models = []
models = [
    "CART",
    #"KNN",
    #"MLP",
    #"RF",
    "SGD",
    "SVM_linear",
    #"SVM_rbf",
]

# Whether to generate figures after the experiments.
skip_plots = false

# -----------------------------------------------------------------------------
# Experiments
#
# experiments          : which experiments to run.
#                        Valid: "S2_4b", "S2_Allb", "PS_4b", "PS_Allb"
#                        Comment out or remove names to skip them.
